<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3-Layer KNN Visualization: Mesh → Landmark → Keypoint</title>
    <style>
        body { margin: 0; overflow: hidden; display: flex; font-family: sans-serif; }
        #canvas-container { flex-grow: 1; height: 100vh; position: relative; }
        #sidebar { 
            width: 320px; 
            height: 100vh; 
            background: #222; 
            color: #eee; 
            display: flex;
            flex-direction: column;
            border-left: 1px solid #444; 
            padding: 10px; 
            box-sizing: border-box;
            overflow-y: auto;
        }
        #info-panel {
            margin-bottom: 15px;
        }
        .controls { margin-bottom: 15px; }
        button { background: #444; color: white; border: none; padding: 5px 10px; cursor: pointer; margin: 2px; }
        button:hover { background: #555; }
        button.active { background: #0a7; }
        
        .layer-toggle {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        #weights-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        #weights-table th, #weights-table td {
            text-align: left;
            padding: 4px;
            border-bottom: 1px solid #444;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; background: rgba(0,0,0,0.7); padding: 20px;
            border-radius: 10px; pointer-events: none;
        }
        .legend {
            font-size: 11px;
            margin: 10px 0;
            padding: 8px;
            background: #333;
            border-radius: 4px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="loading">Loading 3-Layer Model...</div>
</div>

<div id="sidebar">
    <h3>3-Layer Hierarchy</h3>
    
    <div class="controls">
        <h4 style="margin: 5px 0;">Visualization Mode</h4>
        <div class="layer-toggle">
            <button id="mode-mesh-landmark" class="active">Mesh → Landmark</button>
            <button id="mode-landmark-keypoint">Landmark → Keypoint</button>
        </div>
    </div>
    
    <div class="legend">
        <div id="legend-mesh-landmark">
            <div class="legend-item">
                <div class="legend-color" style="background: #888;"></div>
                <span>Mesh (Source)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #0af;"></div>
                <span>Landmark (Target)</span>
            </div>
        </div>
        <div id="legend-landmark-keypoint" style="display: none;">
            <div class="legend-item">
                <div class="legend-color" style="background: #0af;"></div>
                <span>Landmark (Source)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f00;"></div>
                <span>Keypoint (Target)</span>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button id="reset-cam">Reset Camera</button>
        <div style="margin-top:5px; font-size: 11px; color: #aaa;">
            <b>Click points to see connections</b><br>
            Drag: Rotate | Right/Ctrl: Pan | Scroll: Zoom
        </div>
    </div>
    
    <div id="info-panel">
        <div><b>Selected:</b> <span id="sel-layer">None</span></div>
        <div><b>Index:</b> <span id="sel-id">-</span></div>
        <div><b>Connection:</b> <span id="sel-conn">-</span></div>
    </div>

    <h4>KNN Neighbors</h4>
    <table id="weights-table">
        <thead>
            <tr>
                <th>Target Index</th>
                <th>Weight</th>
            </tr>
        </thead>
        <tbody id="weights-body">
            <!-- Filled by JS -->
        </tbody>
    </table>
</div>

<!-- Import Three.js and OrbitControls via CDN -->
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // State
    let knnData = null;
    let meshPoints = null;
    let landmarkPoints = null;
    let keypointPoints = null;
    let linesSegments = null;
    
    let originalMeshColors = null;
    let originalLandmarkColors = null;
    let originalKeypointColors = null;
    
    let selectedLayer = null; // 'mesh' or 'landmark'
    let selectedIdx = -1;
    
    let visualizationMode = 'mesh-landmark'; // 'mesh-landmark' or 'landmark-keypoint'

    // Raycasting
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points.threshold = 0.5;
    const mouse = new THREE.Vector2();

    // Scene Setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(10, 10, 10);
    scene.add(dirLight);

    // Load Data
    async function loadAll() {
        try {
            console.log("Loading 3-Layer KNN Data...");
            const response = await fetch('knn_data.json');
            knnData = await response.json();

            const meshPositions = new Float32Array(knnData.mesh_vertices);
            const landmarkPositions = new Float32Array(knnData.landmark_vertices);
            const keypointPositions = new Float32Array(knnData.keypoint_vertices);
            
            console.log("Loaded:", 
                meshPositions.length/3, "mesh,",
                landmarkPositions.length/3, "landmark,",
                keypointPositions.length/3, "keypoint vertices"
            );
            
            // 1. Create Mesh Points (Gray)
            const meshGeometry = new THREE.BufferGeometry();
            meshGeometry.setAttribute('position', new THREE.BufferAttribute(meshPositions, 3));
            
            const mCount = meshPositions.length / 3;
            const mColors = new Float32Array(mCount * 3);
            for(let i=0; i<mCount; i++) {
                mColors[i*3] = 0.53;
                mColors[i*3+1] = 0.53;
                mColors[i*3+2] = 0.53;
            }
            meshGeometry.setAttribute('color', new THREE.BufferAttribute(mColors, 3));
            originalMeshColors = Float32Array.from(mColors);

            const meshMaterial = new THREE.PointsMaterial({ 
                size: 0.15, 
                vertexColors: true, 
                sizeAttenuation: true 
            });
            meshPoints = new THREE.Points(meshGeometry, meshMaterial);
            scene.add(meshPoints);

            // 2. Create Landmark Points (Cyan/Turquoise)
            const landmarkGeometry = new THREE.BufferGeometry();
            landmarkGeometry.setAttribute('position', new THREE.BufferAttribute(landmarkPositions, 3));
            
            const lCount = landmarkPositions.length / 3;
            const lColors = new Float32Array(lCount * 3);
            for(let i=0; i<lCount; i++) {
                lColors[i*3] = 0.0;
                lColors[i*3+1] = 0.67;
                lColors[i*3+2] = 1.0;
            }
            landmarkGeometry.setAttribute('color', new THREE.BufferAttribute(lColors, 3));
            originalLandmarkColors = Float32Array.from(lColors);

            const landmarkMaterial = new THREE.PointsMaterial({ 
                size: 0.35, 
                vertexColors: true, 
                sizeAttenuation: true 
            });
            landmarkPoints = new THREE.Points(landmarkGeometry, landmarkMaterial);
            landmarkPoints.renderOrder = 1;
            scene.add(landmarkPoints);

            // 3. Create Keypoint Points (Red)
            const keypointGeometry = new THREE.BufferGeometry();
            keypointGeometry.setAttribute('position', new THREE.BufferAttribute(keypointPositions, 3));
            
            const kCount = keypointPositions.length / 3;
            const kColors = new Float32Array(kCount * 3);
            for(let i=0; i<kCount; i++) {
                kColors[i*3] = 1.0;
                kColors[i*3+1] = 0.0;
                kColors[i*3+2] = 0.0;
            }
            keypointGeometry.setAttribute('color', new THREE.BufferAttribute(kColors, 3));
            originalKeypointColors = Float32Array.from(kColors);

            const keypointMaterial = new THREE.PointsMaterial({ 
                size: 0.6, 
                vertexColors: true, 
                sizeAttenuation: true 
            });
            keypointMaterial.depthTest = false;
            keypointPoints = new THREE.Points(keypointGeometry, keypointMaterial);
            keypointPoints.renderOrder = 2;
            scene.add(keypointPoints);
            
            document.getElementById('loading').style.display = 'none';

            // Center camera
            const box = new THREE.Box3().setFromObject(meshPoints);
            const center = box.getCenter(new THREE.Vector3());
            controls.target.copy(center);
            camera.position.set(center.x, center.y, center.z + 50);
            controls.update();

        } catch (e) {
            console.error(e);
            document.getElementById('loading').innerText = "Error Loading Data: " + e.message;
        }
    }

    function getColorForWeight(w) {
        // Blue (Low) -> Yellow -> Red (High)
        const r = Math.min(1.0, w * 2);
        const g = w < 0.5 ? w * 2 : 2 - w * 2;
        const b = Math.max(0.0, 1.0 - w * 2);
        return [r, g, b];
    }

    function resetColors() {
        meshPoints.geometry.attributes.color.array.set(originalMeshColors);
        meshPoints.geometry.attributes.color.needsUpdate = true;
        
        landmarkPoints.geometry.attributes.color.array.set(originalLandmarkColors);
        landmarkPoints.geometry.attributes.color.needsUpdate = true;
        
        keypointPoints.geometry.attributes.color.array.set(originalKeypointColors);
        keypointPoints.geometry.attributes.color.needsUpdate = true;
    }

    function clearLines() {
        if(linesSegments) {
            scene.remove(linesSegments);
            linesSegments.geometry.dispose();
            linesSegments.material.dispose();
            linesSegments = null;
        }
    }

    function selectPoint(layer, index) {
        if(index < 0) return;
        
        selectedLayer = layer;
        selectedIdx = index;
        
        resetColors();
        clearLines();
        
        document.getElementById('sel-layer').innerText = layer.charAt(0).toUpperCase() + layer.slice(1);
        document.getElementById('sel-id').innerText = index;
        
        const tbody = document.getElementById('weights-body');
        tbody.innerHTML = '';
        
        if(layer === 'mesh') {
            // Mesh → Landmark
            document.getElementById('sel-conn').innerText = 'Mesh → Landmark';
            
            const mColors = meshPoints.geometry.attributes.color.array;
            const lColors = landmarkPoints.geometry.attributes.color.array;
            
            // Highlight selected mesh point (White)
            mColors[index*3] = 1.0;
            mColors[index*3+1] = 1.0;
            mColors[index*3+2] = 1.0;
            meshPoints.geometry.attributes.color.needsUpdate = true;
            
            const neighbors = knnData.mesh2landmark_indices[index];
            const weights = knnData.mesh2landmark_weights[index];
            
            const mPosAttr = meshPoints.geometry.attributes.position;
            const lPosAttr = landmarkPoints.geometry.attributes.position;
            
            const mx = mPosAttr.getX(index);
            const my = mPosAttr.getY(index);
            const mz = mPosAttr.getZ(index);
            
            const linePositions = [];
            const lineColors = [];
            
            for(let k=0; k < neighbors.length; k++) {
                const lIdx = neighbors[k];
                const weight = weights[k];
                
                // Highlight landmark neighbor (Yellow)
                lColors[lIdx*3] = 1.0;
                lColors[lIdx*3+1] = 1.0;
                lColors[lIdx*3+2] = 0.0;
                
                const lx = lPosAttr.getX(lIdx);
                const ly = lPosAttr.getY(lIdx);
                const lz = lPosAttr.getZ(lIdx);
                
                linePositions.push(mx, my, mz);
                linePositions.push(lx, ly, lz);
                
                const col = getColorForWeight(weight);
                lineColors.push(col[0], col[1], col[2]);
                lineColors.push(col[0], col[1], col[2]);
                
                const row = document.createElement('tr');
                row.innerHTML = `<td>Landmark ${lIdx}</td><td>${weight.toFixed(4)}</td>`;
                tbody.appendChild(row);
            }
            
            landmarkPoints.geometry.attributes.color.needsUpdate = true;
            
            if (linePositions.length > 0) {
                const lineGeo = new THREE.BufferGeometry();
                lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
                lineGeo.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
                
                const lineMat = new THREE.LineBasicMaterial({ 
                    vertexColors: true, 
                    transparent: true, 
                    opacity: 0.6 
                });
                linesSegments = new THREE.LineSegments(lineGeo, lineMat);
                scene.add(linesSegments);
            }
            
        } else if(layer === 'landmark') {
            // Landmark → Keypoint
            document.getElementById('sel-conn').innerText = 'Landmark → Keypoint';
            
            const lColors = landmarkPoints.geometry.attributes.color.array;
            const kColors = keypointPoints.geometry.attributes.color.array;
            
            // Highlight selected landmark point (White)
            lColors[index*3] = 1.0;
            lColors[index*3+1] = 1.0;
            lColors[index*3+2] = 1.0;
            landmarkPoints.geometry.attributes.color.needsUpdate = true;
            
            const neighbors = knnData.landmark2keypoint_indices[index];
            const weights = knnData.landmark2keypoint_weights[index];
            
            const lPosAttr = landmarkPoints.geometry.attributes.position;
            const kPosAttr = keypointPoints.geometry.attributes.position;
            
            const lx = lPosAttr.getX(index);
            const ly = lPosAttr.getY(index);
            const lz = lPosAttr.getZ(index);
            
            const linePositions = [];
            const lineColors = [];
            
            for(let k=0; k < neighbors.length; k++) {
                const kIdx = neighbors[k];
                const weight = weights[k];
                
                // Highlight keypoint neighbor (Yellow)
                kColors[kIdx*3] = 1.0;
                kColors[kIdx*3+1] = 1.0;
                kColors[kIdx*3+2] = 0.0;
                
                const kx = kPosAttr.getX(kIdx);
                const ky = kPosAttr.getY(kIdx);
                const kz = kPosAttr.getZ(kIdx);
                
                linePositions.push(lx, ly, lz);
                linePositions.push(kx, ky, kz);
                
                const col = getColorForWeight(weight);
                lineColors.push(col[0], col[1], col[2]);
                lineColors.push(col[0], col[1], col[2]);
                
                const row = document.createElement('tr');
                row.innerHTML = `<td>Keypoint ${kIdx}</td><td>${weight.toFixed(4)}</td>`;
                tbody.appendChild(row);
            }
            
            keypointPoints.geometry.attributes.color.needsUpdate = true;
            
            if (linePositions.length > 0) {
                const lineGeo = new THREE.BufferGeometry();
                lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
                lineGeo.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
                
                const lineMat = new THREE.LineBasicMaterial({ 
                    vertexColors: true, 
                    transparent: true, 
                    opacity: 0.6 
                });
                linesSegments = new THREE.LineSegments(lineGeo, lineMat);
                scene.add(linesSegments);
            }
        }
    }

    function setVisualizationMode(mode) {
        visualizationMode = mode;
        
        // Clear selection
        resetColors();
        clearLines();
        selectedLayer = null;
        selectedIdx = -1;
        document.getElementById('sel-layer').innerText = 'None';
        document.getElementById('sel-id').innerText = '-';
        document.getElementById('sel-conn').innerText = '-';
        document.getElementById('weights-body').innerHTML = '';
        
        // Update button states
        document.getElementById('mode-mesh-landmark').classList.toggle('active', mode === 'mesh-landmark');
        document.getElementById('mode-landmark-keypoint').classList.toggle('active', mode === 'landmark-keypoint');
        
        // Update legend visibility
        document.getElementById('legend-mesh-landmark').style.display = mode === 'mesh-landmark' ? 'block' : 'none';
        document.getElementById('legend-landmark-keypoint').style.display = mode === 'landmark-keypoint' ? 'block' : 'none';
        
        // Update layer visibility based on mode
        if (mode === 'mesh-landmark') {
            meshPoints.visible = true;
            landmarkPoints.visible = true;
            keypointPoints.visible = false;
        } else { // landmark-keypoint
            meshPoints.visible = false;
            landmarkPoints.visible = true;
            keypointPoints.visible = true;
        }
    }

    // Raycast Interaction
    function onMouseClick(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        if (visualizationMode === 'mesh-landmark') {
            // Mesh → Landmark mode: allow clicking mesh points
            const mIntersects = raycaster.intersectObject(meshPoints);
            if (mIntersects.length > 0) {
                selectPoint('mesh', mIntersects[0].index);
                return;
            }
        } else { // landmark-keypoint
            // Landmark → Keypoint mode: allow clicking landmark points
            const lIntersects = raycaster.intersectObject(landmarkPoints);
            if (lIntersects.length > 0) {
                selectPoint('landmark', lIntersects[0].index);
                return;
            }
        }
    }

    container.addEventListener('click', onMouseClick);
    
    // UI Controls
    document.getElementById('reset-cam').onclick = () => {
        controls.reset();
    };
    
    document.getElementById('mode-mesh-landmark').onclick = () => {
        setVisualizationMode('mesh-landmark');
    };
    
    document.getElementById('mode-landmark-keypoint').onclick = () => {
        setVisualizationMode('landmark-keypoint');
    };

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    
    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    loadAll().then(() => {
        // Initialize with mesh-landmark mode
        setVisualizationMode('mesh-landmark');
    });
    animate();
</script>

</body>
</html>
